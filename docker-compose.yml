services:
  postgres:
    image: postgres:16-alpine
    container_name: student-cabinet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_cabinet}
      POSTGRES_USER: ${POSTGRES_USER:-student_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-student_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-student_app} -d ${POSTGRES_DB:-student_cabinet}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
