services:
  postgres:
    image: postgres:16-alpine
    container_name: student-cabinet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_cabinet}
      POSTGRES_USER: ${POSTGRES_USER:-student_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-student_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-student_app} -d ${POSTGRES_DB:-student_cabinet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-1c:
    build: ./mock-1c
    container_name: student-cabinet-mock1c
    restart: unless-stopped
    ports:
      - "8091:8091"

  student-api:
    build: ./student-api
    container_name: student-cabinet-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mock-1c:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-student_cabinet}
      DB_USERNAME: ${POSTGRES_USER:-student_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-student_app}
      ONEC_BASE_URL: http://mock-1c:8091
      ONEC_SYNC_ENABLED: "true"
      ONEC_SYNC_INITIAL_DELAY_MS: 5000
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173

  student-cabinet:
    build: ./student-cabinet
    container_name: student-cabinet-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - student-api

  kafka:
    image: apache/kafka:3.7.0
    container_name: student-cabinet-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  postgres_data:
